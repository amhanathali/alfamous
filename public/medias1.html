<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Médias — redirection</title>
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        p.set("prog", "medias1");
        window.location.replace("index.html?" + p.toString());
      } catch (e) {
        window.location.replace("index.html?prog=medias1");
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=index.html?prog=medias1">
</head>
<body>
  <p>Redirection vers l’application… <a href="index.html?prog=medias1">index.html?prog=medias1</a></p>
</body>
</html>
