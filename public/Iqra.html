        // Fonction pour afficher ou cacher un PDF en fonction de l'état du bouton à cocher
        function togglePdfVisibility(pdfIndex) {
            var iframe = document.getElementById('IframePDF_' + pdfIndex);
            var downloadLink = document.getElementById('pdfDownloadLink_' + pdfIndex);
            var checkbox = document.getElementById('showPdfCheckbox_' + pdfIndex);
            iframe.style.display = checkbox.checked ? 'block' : 'none';
            downloadLink.style.display = checkbox.checked ? 'none' : 'block';
        }
    </script>

    <!-- Boucle pour afficher tous les PDF -->
    <div style="text-align: center;">
        <hr />
        <div class="separator" style="clear: both; text-align: center;">
            <!-- Utilisez une boucle pour afficher tous les PDF -->
            <script>
                for (let i = 0; i < pdfLinks.length; i++) {
                    var link = pdfLinks[i];
                    document.write(`
                        <div>
                            <a href="${link.pdfLink}" imageanchor="1" style="font-weight: normal; margin-left: 1em; margin-right: 1em;">
                                <img alt="${link.title}" border="0" height="320" src="${link.imageLink}" title="${link.title}" width="211" />
                            </a>
                        </div>

                        <!-- Bouton à cocher pour afficher le PDF -->
                        <label>Afficher ${link.title}</label>
                        <input id="showPdfCheckbox_${i}" type="checkbox" onchange="togglePdfVisibility(${i})" />

                        <!-- Lien de téléchargement du PDF -->
                        <a id="pdfDownloadLink_${i}" href="${link.downloadLink}" style="display: block;">Télécharger le PDF</a>

                        <!-- iframe pour afficher le PDF -->
                        <iframe height="600px" id="IframePDF_${i}" src="${link.previewLink}" style="display: none;" width="100%"></iframe>

                        <!-- Lien pour imprimer sur Amazon -->
                        <a href="${link.amazonPrintLink}" target="_blank">${link.amazonPrintLabel}</a>

                        <hr />
                    `);
                }
            </script>
