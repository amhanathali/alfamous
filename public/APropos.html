  <style>
    /* Aliases locaux pointant vers les tokens globaux --zc-* */
    :root {
      --fg:   var(--zc-text,   #0f172a);
      --bg:   var(--zc-bg,     #ecfeff);
      --muted: var(--zc-text-muted, #64748b);
      --card: var(--zc-ui-soft-bg, #f8fafc);
      --line: var(--zc-border, #e2e8f0);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", sans-serif;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1rem 1.25rem;
    }

    /* En-tête compact : logo réduit + titre + langue */
    .apropos-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin: 0 0 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--line);
    }

    .apropos-logo {
      flex: 0 0 auto;
      display: block;
      line-height: 0;
    }

    .apropos-logo img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .apropos-header-main {
      flex: 1 1 auto;
      min-width: 0;
    }

    .apropos-header-top {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 6px;
    }

    #btnLang {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 999px;
      padding: 0.28rem 0.55rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    h1 {
      font-size: clamp(0.95rem, 2.8vw, 1.2rem);
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
    }

    h2 {
      margin: 1rem 0 0.45rem;
      font-size: 1.08rem;
    }

    .manifest h2 {
      margin: 1.15rem 0 0.5rem;
      font-size: 1.05rem;
      line-height: 1.35;
    }

    .manifest h2:first-of-type {
      margin-top: 0.85rem;
    }

    /* Citation finale (encadré) */
    .manifest-quote-card {
      text-align: center;
    }

    .manifest-quote {
      margin: 0;
      padding: 1rem 1.15rem;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      font-size: 1.02rem;
      line-height: 1.55;
      font-style: italic;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    [dir="rtl"] blockquote.manifest-quote {
      border: 2px solid var(--line);
      border-left: 2px solid var(--line);
      border-right: 2px solid var(--line);
    }

    h3 {
      margin: 0.85rem 0 0.3rem;
      font-size: 0.98rem;
    }

    .apropos-lead {
      font-size: 0.95rem;
      line-height: 1.55;
      margin: 0 0 0.75rem;
      color: var(--fg);
    }

    .apropos-ui-shot {
      margin: 0.5rem 0 0.75rem;
      text-align: center;
    }

    .apropos-ui-shot img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }

    .apropos-ui-shot figcaption {
      margin-top: 0.35rem;
      font-size: 0.82rem;
    }

    .muted {
      color: var(--muted);
    }

    /* Cartes de section */
    section.card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem 1.1rem;
    }

    section+section {
      margin-top: .85rem;
    }

    /* Listes avec icônes */
    .feat-list {
      list-style: none;
      padding: 0;
      margin: .25rem 0 0 0;
    }

    .feat-item {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      margin: .35rem 0;
    }

    .feat-iconBox {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .feat-emoji {
      font-size: 20px;
      display: block;
      line-height: 1;
    }

    .icon-fa {
      font-size: 16px;
      line-height: 1;
    }

    .icon-img {
      width: 20px;
      height: 20px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    /* Liens */
    a {
      color: var(--zc-link, #0b67d0);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Séparateur */
    hr.sep {
      border: none;
      border-top: 1px solid var(--line);
      margin: 1rem 0;
    }

    /* Bloc auteur discret */
    .author {
      font-size: .94rem;
      color: var(--muted);
    }

    /* RTL */
    [dir="rtl"] .apropos-header {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .apropos-header-top {
      justify-content: flex-start;
    }

    [dir="rtl"] h1 {
      text-align: right;
    }

    [dir="rtl"] .feat-item {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .feat-list {
      padding-right: 0;
    }

    [dir="rtl"] ul {
      padding-left: 0;
      padding-right: 1.25rem;
    }

    [dir="rtl"] blockquote {
      border-left: none;
      border-right: .28rem solid var(--line);
    }

    .collab-closing {
      margin: 0.85rem 0 0;
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .overview-pillar h3 {
      margin: 1rem 0 .35rem;
      font-size: 1.08rem;
    }

    .overview-pillar h3:first-of-type {
      margin-top: .75rem;
    }

</head>

    // ---------- Langues ----------
    const ORDER = ["fr", "ar", "en", "es", "kab"];
    function getUILang() { return (localStorage.getItem("uiLang") || "fr").toLowerCase(); }
    function setUILang(lang) {
      const l = (lang || "fr").toLowerCase();
      localStorage.setItem("uiLang", l);
      document.documentElement.lang = l;
      document.documentElement.dir = (l === "ar") ? "rtl" : "ltr";
      const btn = document.getElementById("btnLang"); if (btn) btn.textContent = "🌐 " + l.toUpperCase();
      render();
    }
    function cycleLang() { const cur = getUILang(); const next = ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length]; setUILang(next); }
    function L(obj) { const l = getUILang(); return (obj && (obj[l] ?? obj.fr)) || ""; }
    function renderList(arr) { return `<ul>${(arr || []).map(li => `<li>${li}</li>`).join("")}</ul>`; }
    function renderFeatSummaryRows(items) {
      const rows = Array.isArray(items) ? items : [];
      return rows.map(([ico, txt]) => `
            <li class="feat-item">
              <span class="feat-iconBox"><span class="feat-emoji">${ico}</span></span>
              <span>${txt}</span>
            </li>`).join("");
    }

        <section class="card manifest-quote-card" id="closing-quote" aria-label="${L(TEXTS.quoteCardAria).replace(/"/g, "&quot;")}">
          <blockquote class="manifest-quote">${L(TEXTS.quote)}</blockquote>
        </section>
      `;
      document.getElementById("content").innerHTML = html;
    }

    // ---------- Init ----------
    document.getElementById("btnLang").addEventListener("click", cycleLang);
    setUILang(getUILang());
  </script>
</body>

</html>
